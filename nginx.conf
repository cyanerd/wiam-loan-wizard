server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip для текстовых ассетов — экономит ~70% трафика на JS/CSS.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;

    # Хешированные ассеты Vite — кешируем навсегда, immutable.
    location ~* \.(js|css|svg|png|jpg|jpeg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html и SPA fallback (/step-1, /step-2 и т.п.) — не кешировать,
    # иначе после редеплоя пользователь получит старый HTML, ссылающийся
    # на уже удалённые хеши ассетов.
    location / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
